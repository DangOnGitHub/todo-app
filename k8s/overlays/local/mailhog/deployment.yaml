apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: todo-app
  labels:
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/component: mail-server
    app.kubernetes.io/part-of: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mail-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailhog
        app.kubernetes.io/component: mail-server
        app.kubernetes.io/part-of: todo-app
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:latest
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
