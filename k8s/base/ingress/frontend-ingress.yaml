apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: todo-app
  labels:
    app.kubernetes.io/part-of: todo-app
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - localhost
      secretName: todo-app-tls
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
