apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: todo-app
    spec:
      containers:
        - name: frontend
          image: todo-app/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
