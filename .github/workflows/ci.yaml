name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Build & Scan Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          pull: true
          push: false
          load: true
          tags: backend:pr-${{ github.event.number }}
          cache-from: type=registry,ref=ghcr.io/dangongithub/todo-app/backend:buildcache

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: backend:pr-${{ github.event.number }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  build-frontend:
    name: Build & Scan Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: frontend:pr-${{ github.event.number }}
          build-args: VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=registry,ref=ghcr.io/dangongithub/todo-app/frontend:buildcache

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: frontend:pr-${{ github.event.number }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
